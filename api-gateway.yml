server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            
            - id: auth-swagger
              uri: http://localhost:8081
              predicates:
                - Path=/auth/swagger-ui/**,/auth/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: user-swagger
              uri: http://localhost:8082
              predicates:
                - Path=/users/swagger-ui/**,/users/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: skill-swagger
              uri: http://localhost:8084
              predicates:
                - Path=/skills/swagger-ui/**,/skills/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: mentor-swagger
              uri: http://localhost:8083
              predicates:
                - Path=/mentors/swagger-ui/**,/mentors/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: session-swagger
              uri: http://localhost:8085
              predicates:
                - Path=/sessions/swagger-ui/**,/sessions/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: review-swagger
              uri: http://localhost:8086
              predicates:
                - Path=/reviews/swagger-ui/**,/reviews/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: notification-swagger
              uri: http://localhost:8088
              predicates:
                - Path=/notifications/swagger-ui/**,/notifications/v3/api-docs/**
              filters:
                - StripPrefix=1

            
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/users/**

            - id: skill-service
              uri: http://localhost:8084
              predicates:
                - Path=/skills/**

            - id: mentor-service
              uri: http://localhost:8083
              predicates:
                - Path=/mentors/**

            - id: session-service
              uri: http://localhost:8085
              predicates:
                - Path=/sessions/**

            - id: review-service
              uri: http://localhost:8086
              predicates:
                - Path=/reviews/**

            - id: notification-service
              uri: http://localhost:8088
              predicates:
                - Path=/notifications/**

            - id: group-service
              uri: http://localhost:8089
              predicates:
                - Path=/groups/**

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"

jwt:
  secret: c2tpbGxzeW5jc2VjcmV0a2V5c2tpbGxzeW5jc2VjcmV0a2V5

logging:
  level:
    org.springframework.cloud.gateway: TRACE

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
