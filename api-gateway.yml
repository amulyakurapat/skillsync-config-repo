server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/users/**

            - id: skill-service
              uri: http://localhost:8083
              predicates:
                - Path=/skills/**

            - id: mentor-service
              uri: http://localhost:8084
              predicates:
                - Path=/mentors/**

            - id: session-service
              uri: http://localhost:8085
              predicates:
                - Path=/sessions/**

            - id: review-service
              uri: http://localhost:8086
              predicates:
                - Path=/reviews/**

            - id: notification-service
              uri: http://localhost:8087
              predicates:
                - Path=/notifications/**

            - id: group-service
              uri: http://localhost:8088
              predicates:
                - Path=/groups/**

logging:
  level:
    org.springframework.cloud.gateway: TRACE

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
