server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

            - id: auth-swagger-ui
              uri: http://localhost:8081
              predicates:
                - Path=/auth/swagger-ui/**

            - id: auth-api-docs
              uri: http://localhost:8081
              predicates:
                - Path=/auth/v3/api-docs/**

            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/users/**

            - id: user-swagger-ui
              uri: http://localhost:8082
              predicates:
                - Path=/users/swagger-ui/**

            - id: user-api-docs
              uri: http://localhost:8082
              predicates:
                - Path=/users/v3/api-docs/**

            - id: skill-service
              uri: http://localhost:8084
              predicates:
                - Path=/skills/**

            - id: skill-swagger-ui
              uri: http://localhost:8084
              predicates:
                - Path=/skills/swagger-ui/**

            - id: skill-api-docs
              uri: http://localhost:8084
              predicates:
                - Path=/skills/v3/api-docs/**

            - id: mentor-service
              uri: http://localhost:8083
              predicates:
                - Path=/mentors/**

            - id: mentor-swagger-ui
              uri: http://localhost:8083
              predicates:
                - Path=/mentors/swagger-ui/**

            - id: mentor-api-docs
              uri: http://localhost:8083
              predicates:
                - Path=/mentors/v3/api-docs/**

            - id: session-service
              uri: http://localhost:8085
              predicates:
                - Path=/sessions/**

            - id: session-swagger-ui
              uri: http://localhost:8085
              predicates:
                - Path=/sessions/swagger-ui/**

            - id: session-api-docs
              uri: http://localhost:8085
              predicates:
                - Path=/sessions/v3/api-docs/**

            - id: review-service
              uri: http://localhost:8086
              predicates:
                - Path=/reviews/**

            - id: review-swagger-ui
              uri: http://localhost:8086
              predicates:
                - Path=/reviews/swagger-ui/**

            - id: review-api-docs
              uri: http://localhost:8086
              predicates:
                - Path=/reviews/v3/api-docs/**

            - id: notification-service
              uri: http://localhost:8088
              predicates:
                - Path=/notifications/**

            - id: notification-swagger-ui
              uri: http://localhost:8088
              predicates:
                - Path=/notifications/swagger-ui/**

            - id: notification-api-docs
              uri: http://localhost:8088
              predicates:
                - Path=/notifications/v3/api-docs/**

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"

jwt:
  secret: c2tpbGxzeW5jc2VjcmV0a2V5c2tpbGxzeW5jc2VjcmV0a2V5

logging:
  level:
    org.springframework.cloud.gateway: TRACE

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
